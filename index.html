<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern To-Do List</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1><i class="fas fa-check-double"></i> Tasks</h1>
        </header>
        
        <div class="controls-section">
            <div class="input-group">
                <input type="text" id="task-input" placeholder="What needs to be done?">
                <button id="add-btn" aria-label="Add task"><i class="fas fa-plus"></i></button>
            </div>
            
            <div class="search-filter-group">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="search-input" placeholder="Search tasks...">
                </div>
                
                <div class="filters">
                    <button class="filter-btn active" data-filter="all">All</button>
                    <button class="filter-btn" data-filter="active">Active</button>
                    <button class="filter-btn" data-filter="completed">Completed</button>
                </div>
            </div>
        </div>

        <div class="stats-container">
            <div class="stat-box">
                <span class="stat-label">Total</span>
                <span class="stat-value" id="total-tasks">0</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">Active</span>
                <span class="stat-value" id="active-tasks">0</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">Completed</span>
                <span class="stat-value" id="completed-tasks">0</span>
            </div>
        </div>

        <div class="task-list-container">
            <ul id="task-list">
                <!-- Tasks will be injected here by JS -->
            </ul>
            
            <div id="empty-state" class="empty-state hidden">
                <div class="empty-illustration">
                    <i class="fas fa-clipboard-list"></i>
                </div>
                <h3>No tasks found</h3>
                <p>You're all caught up! Add a new task above.</p>
            </div>
        </div>

        <div class="actions-footer">
            <button id="clear-completed-btn" class="action-btn text-btn">Clear Completed</button>
            <button id="delete-all-btn" class="action-btn text-btn danger">Delete All</button>
        </div>
    </div>
    
    <!-- Scripts -->
    <script src="script.js"></script>
</body>
</html>
